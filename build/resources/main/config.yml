# ============================================
# BDcpvper - Configuration
# ============================================

logs:
  # Log to console when a Bedrock player joins
  player-join: true

  # Log End Crystal actions
  crystal-actions: false

  # Log Respawn Anchor actions
  anchor-actions: false

messages:
  # Send a welcome message to Bedrock players
  welcome-message: true

  # Messages sent on join
  welcome-text:
    - "&a&l[BDcpvper] &7Welcome Bedrock player"
    - "&a&l[BDcpvper] &7Crystal PvP optimized for your client"

crystals:
  ultra-fast-place: true
  ultra-fast-break: true

  # Explosion when a crystal is broken
  explosion-enabled: true
  explosion-power: 6.0
  explosion-breaks-blocks: false
  explosion-causes-fire: false

  # End Crystal visual option
  show-crystal-base: false

anchors:
  ultra-fast-place: true
  ultra-fast-break: true

  # Drops/exp when breaking anchor in survival
  drop-item: true
  give-experience: true
  experience-amount: 3
